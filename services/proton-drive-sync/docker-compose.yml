services:
  proton-drive-sync:
    image: ghcr.io/damianb-bitflipper/proton-drive-sync:latest
    container_name: proton-drive-sync
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    networks:
      - nexus
    environment:
      - TZ=${TZ}
      - KEYRING_PASSWORD=${PROTON_DRIVE_KEYRING_PASSWORD}
    volumes:
      - ${NEXUS_DATA_DIRECTORY}/Config/proton-drive-sync/config:/config
      - ${NEXUS_DATA_DIRECTORY}/Config/proton-drive-sync/state:/state
      - ${PAPERLESS_DOCUMENTS_DIRECTORY}:/data/paperless-documents:ro
      - ${NEXUS_DATA_DIRECTORY}/Backups:/data/backups:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=nexus"
      - "traefik.http.routers.proton-drive-sync.rule=Host(`protondrive.${NEXUS_DOMAIN}`)"
      - "traefik.http.routers.proton-drive-sync.entrypoints=https"
      - "traefik.http.routers.proton-drive-sync.middlewares=tailscale-chain@file"
      - "traefik.http.routers.proton-drive-sync.tls=true"
      - "traefik.http.routers.proton-drive-sync.tls.certresolver=certchallenge"
      - "traefik.http.services.proton-drive-sync.loadbalancer.server.port=4242"

networks:
  nexus:
    external: true
