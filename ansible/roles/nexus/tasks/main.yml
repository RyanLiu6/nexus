---
# Nexus services deployment tasks

- name: Display services to deploy
  ansible.builtin.debug:
    msg: "Deploying services: {{ nexus_services }}"

- name: Check if services list is "all"
  ansible.builtin.set_fact:
    nexus_deploy_all_services: "{{ nexus_services == 'all' }}"

- name: Get all available services
  ansible.builtin.find:
    paths: "{{ nexus_root_directory }}/services"
    file_type: directory
  register: nexus_service_directories

- name: Set service list
  ansible.builtin.set_fact:
    nexus_final_services: >-
      {{ nexus_service_directories.files | map(attribute='path') | map('basename') | list
         if nexus_deploy_all_services else nexus_services.split(',') }}

- name: Display final service list
  ansible.builtin.debug:
    msg: "Final services to deploy: {{ nexus_final_services }}"

# Generate combined docker-compose.yml from individual service files
- name: Read service docker-compose files
  ansible.builtin.slurp:
    src: "{{ nexus_root_directory }}/services/{{ item }}/docker-compose.yml"
  loop: "{{ nexus_final_services }}"
  register: nexus_compose_files
  failed_when: false

- name: Generate combined docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ nexus_root_directory }}/docker-compose.yml"
    mode: "0644"
  vars:
    service_nexus_compose_files: "{{ nexus_compose_files.results }}"

- name: Generate Tailscale access rules
  ansible.builtin.template:
    src: access-rules.yml.j2
    dest: "{{ nexus_root_directory }}/tailscale/access-rules.yml"
    mode: "0644"

- name: Resolve base data directory
  ansible.builtin.set_fact:
    nexus_base_path: "{{ nexus_data_directory | default('/Volumes/Data') }}"

- name: Resolve userdata-based directory paths
  ansible.builtin.set_fact:
    nexus_foundryvtt_dir: >-
      {{ nexus_userdata_directory + '/foundryvtt'
         if nexus_userdata_directory is defined and nexus_userdata_directory
         else nexus_base_path + '/Config/foundryvtt/data' }}
    nexus_paperless_dir: >-
      {{ nexus_userdata_directory + '/paperless'
         if nexus_userdata_directory is defined and nexus_userdata_directory
         else nexus_base_path + '/Config/paperless/media' }}
    nexus_grimmory_dir: >-
      {{ nexus_userdata_directory + '/grimmory'
         if nexus_userdata_directory is defined and nexus_userdata_directory
         else nexus_base_path + '/Config/grimmory/books' }}
    nexus_sure_dir: >-
      {{ nexus_userdata_directory + '/sure'
         if nexus_userdata_directory is defined and nexus_userdata_directory
         else nexus_base_path + '/Config/sure' }}
    nexus_userdata_env_dir: >-
      {{ nexus_userdata_directory
         if nexus_userdata_directory is defined and nexus_userdata_directory
         else nexus_base_path + '/Config' }}

- name: Ensure FoundryVTT Config directory exists
  ansible.builtin.file:
    path: "{{ nexus_foundryvtt_dir }}/Config"
    state: directory
    mode: "0755"
  when: "'foundryvtt' in nexus_final_services"

- name: Configure FoundryVTT S3/R2 storage
  ansible.builtin.template:
    src: "{{ nexus_root_directory }}/services/foundryvtt/s3.json.j2"
    dest: "{{ nexus_foundryvtt_dir }}/Config/s3.json"
    mode: "0644"
  when: "'foundryvtt' in nexus_final_services and foundry_s3_access_key is defined"

- name: Ensure Backrest config directories exist
  ansible.builtin.file:
    path: "{{ nexus_data_directory | default('/Volumes/Data') }}/Config/backrest/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - config
    - data
    - cache
    - rclone
  when: "'backups' in nexus_final_services"

- name: Remove old borgmatic config directory
  ansible.builtin.file:
    path: "{{ nexus_data_directory | default('/Volumes/Data') }}/Config/borgmatic"
    state: absent
  when: "'backups' in nexus_final_services"

- name: Render Backrest config
  ansible.builtin.template:
    src: "{{ nexus_root_directory }}/services/backups/config.json.j2"
    dest: "{{ nexus_data_directory | default('/Volumes/Data') }}/Config/backrest/config/config.json"
    mode: "0600"
  when: "'backups' in nexus_final_services"

- name: Render rclone config for Backrest
  ansible.builtin.template:
    src: "{{ nexus_root_directory }}/services/backups/rclone.conf.j2"
    dest: "{{ nexus_data_directory | default('/Volumes/Data') }}/Config/backrest/rclone/rclone.conf"
    mode: "0600"
  when: "'backups' in nexus_final_services"

- name: Create userdata directories
  ansible.builtin.file:
    path: "{{ nexus_userdata_directory }}/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - paperless
    - grimmory
    - foundryvtt
    - sure
  when: nexus_userdata_directory is defined and nexus_userdata_directory != ''

# TEMPORARY: ProtonDrive rsync backup (remove when rclone supports ProtonDrive)
# macOS: LaunchAgents (launchd) — no TCC/crontab permissions needed
# Linux: cron

- name: Ensure LaunchAgents directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/Library/LaunchAgents"
    state: directory
    mode: '0755'
  when: ansible_system == "Darwin"

- name: Ensure nexus log directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/Library/Logs/nexus"
    state: directory
    mode: '0755'
  when: ansible_system == "Darwin"

- name: Install ProtonDrive rsync LaunchAgent
  ansible.builtin.template:
    src: protondrive-sync.plist.j2
    dest: "{{ ansible_env.HOME }}/Library/LaunchAgents/com.nexus.protondrive-sync.plist"
    mode: '0644'
  vars:
    plist_label: com.nexus.protondrive-sync
    plist_hour: 4
    plist_minute: 0
    plist_args:
      - "{{ nexus_root_directory }}/scripts/sync-to-protondrive.sh"
      - "{{ nexus_base_path }}/Backups"
      - "{{ protondrive_sync_directory }}/Containers"
  notify: reload protondrive launchagents
  when:
    - ansible_system == "Darwin"
    - "'backups' in nexus_final_services"
    - protondrive_sync_directory is defined
    - protondrive_sync_directory != ''

- name: Remove ProtonDrive rsync LaunchAgent
  ansible.builtin.shell: |
    launchctl bootout gui/$(id -u) "{{ plist_path }}" 2>/dev/null || true
    rm -f "{{ plist_path }}"
  vars:
    plist_path: "{{ ansible_env.HOME }}/Library/LaunchAgents/com.nexus.protondrive-sync.plist"
  args:
    removes: "{{ ansible_env.HOME }}/Library/LaunchAgents/com.nexus.protondrive-sync.plist"
  changed_when: true
  when:
    - ansible_system == "Darwin"
    - "'backups' in nexus_final_services"
    - protondrive_sync_directory is not defined or protondrive_sync_directory == ''

- name: Install ProtonDrive rsync crontab
  ansible.builtin.cron:
    name: "nexus-protondrive-sync"
    minute: "0"
    hour: "4"
    job: "{{ nexus_root_directory }}/scripts/sync-to-protondrive.sh {{ nexus_base_path }}/Backups {{ protondrive_sync_directory }}/Containers"
  when:
    - ansible_system != "Darwin"
    - "'backups' in nexus_final_services"
    - protondrive_sync_directory is defined
    - protondrive_sync_directory != ''

- name: Remove ProtonDrive rsync crontab
  ansible.builtin.cron:
    name: "nexus-protondrive-sync"
    state: absent
  when:
    - ansible_system != "Darwin"
    - "'backups' in nexus_final_services"
    - protondrive_sync_directory is not defined or protondrive_sync_directory == ''

# Raw user data ProtonDrive sync — paperless documents and grimmory books
# Syncs raw files directly (not via restic) so recovery is never coupled to restic.
- name: Install ProtonDrive paperless raw sync LaunchAgent
  ansible.builtin.template:
    src: protondrive-sync.plist.j2
    dest: "{{ ansible_env.HOME }}/Library/LaunchAgents/com.nexus.protondrive-paperless-sync.plist"
    mode: '0644'
  vars:
    plist_label: com.nexus.protondrive-paperless-sync
    plist_hour: 4
    plist_minute: 30
    plist_args:
      - "{{ nexus_root_directory }}/scripts/sync-to-protondrive.sh"
      - "{{ nexus_userdata_directory }}/paperless"
      - "{{ protondrive_sync_directory }}/paperless"
      - paperless-web
      - paperless-redis
      - paperless-db
  notify: reload protondrive launchagents
  when:
    - ansible_system == "Darwin"
    - nexus_userdata_directory is defined
    - nexus_userdata_directory != ''
    - protondrive_sync_directory is defined
    - protondrive_sync_directory != ''

- name: Remove ProtonDrive paperless raw sync LaunchAgent
  ansible.builtin.shell: |
    launchctl bootout gui/$(id -u) "{{ plist_path }}" 2>/dev/null || true
    rm -f "{{ plist_path }}"
  vars:
    plist_path: "{{ ansible_env.HOME }}/Library/LaunchAgents/com.nexus.protondrive-paperless-sync.plist"
  args:
    removes: "{{ ansible_env.HOME }}/Library/LaunchAgents/com.nexus.protondrive-paperless-sync.plist"
  changed_when: true
  when:
    - ansible_system == "Darwin"
    - nexus_userdata_directory is not defined or nexus_userdata_directory == '' or
      protondrive_sync_directory is not defined or protondrive_sync_directory == ''

- name: Install ProtonDrive paperless raw sync crontab
  ansible.builtin.cron:
    name: "nexus-protondrive-paperless-sync"
    minute: "30"
    hour: "4"
    job: "{{ nexus_root_directory }}/scripts/sync-to-protondrive.sh {{ nexus_userdata_directory }}/paperless {{ protondrive_sync_directory }}/paperless paperless-web paperless-redis paperless-db"
  when:
    - ansible_system != "Darwin"
    - nexus_userdata_directory is defined
    - nexus_userdata_directory != ''
    - protondrive_sync_directory is defined
    - protondrive_sync_directory != ''

- name: Remove ProtonDrive paperless raw sync crontab
  ansible.builtin.cron:
    name: "nexus-protondrive-paperless-sync"
    state: absent
  when: >
    ansible_system != "Darwin" and
    (nexus_userdata_directory is not defined or nexus_userdata_directory == '' or
    protondrive_sync_directory is not defined or protondrive_sync_directory == '')

- name: Install ProtonDrive grimmory raw sync LaunchAgent
  ansible.builtin.template:
    src: protondrive-sync.plist.j2
    dest: "{{ ansible_env.HOME }}/Library/LaunchAgents/com.nexus.protondrive-grimmory-sync.plist"
    mode: '0644'
  vars:
    plist_label: com.nexus.protondrive-grimmory-sync
    plist_hour: 5
    plist_minute: 0
    plist_args:
      - "{{ nexus_root_directory }}/scripts/sync-to-protondrive.sh"
      - "{{ nexus_userdata_directory }}/grimmory"
      - "{{ protondrive_sync_directory }}/grimmory"
      - grimmory
      - grimmory-db
  notify: reload protondrive launchagents
  when:
    - ansible_system == "Darwin"
    - nexus_userdata_directory is defined
    - nexus_userdata_directory != ''
    - protondrive_sync_directory is defined
    - protondrive_sync_directory != ''

- name: Remove ProtonDrive grimmory raw sync LaunchAgent
  ansible.builtin.shell: |
    launchctl bootout gui/$(id -u) "{{ plist_path }}" 2>/dev/null || true
    rm -f "{{ plist_path }}"
  vars:
    plist_path: "{{ ansible_env.HOME }}/Library/LaunchAgents/com.nexus.protondrive-grimmory-sync.plist"
  args:
    removes: "{{ ansible_env.HOME }}/Library/LaunchAgents/com.nexus.protondrive-grimmory-sync.plist"
  changed_when: true
  when:
    - ansible_system == "Darwin"
    - nexus_userdata_directory is not defined or nexus_userdata_directory == '' or
      protondrive_sync_directory is not defined or protondrive_sync_directory == ''

- name: Install ProtonDrive grimmory raw sync crontab
  ansible.builtin.cron:
    name: "nexus-protondrive-grimmory-sync"
    minute: "0"
    hour: "5"
    job: "{{ nexus_root_directory }}/scripts/sync-to-protondrive.sh {{ nexus_userdata_directory }}/grimmory {{ protondrive_sync_directory }}/grimmory grimmory grimmory-db"
  when:
    - ansible_system != "Darwin"
    - nexus_userdata_directory is defined
    - nexus_userdata_directory != ''
    - protondrive_sync_directory is defined
    - protondrive_sync_directory != ''

- name: Remove ProtonDrive grimmory raw sync crontab
  ansible.builtin.cron:
    name: "nexus-protondrive-grimmory-sync"
    state: absent
  when: >
    ansible_system != "Darwin" and
    (nexus_userdata_directory is not defined or nexus_userdata_directory == '' or
    protondrive_sync_directory is not defined or protondrive_sync_directory == '')

- name: Stop and remove existing containers
  ansible.builtin.shell: |
    set -o pipefail
    # Stop via compose (handles both default and explicit project names)
    docker compose down --remove-orphans 2>/dev/null || true
    docker compose -p nexus down --remove-orphans 2>/dev/null || true
    # Force remove any remaining containers from this project by label
    docker ps -aq --filter "label=com.docker.compose.project=nexus" | xargs -r docker rm -f 2>/dev/null || true
  args:
    chdir: "{{ nexus_root_directory }}"
    executable: /bin/bash
  changed_when: true

- name: Deploy services using docker compose
  community.docker.docker_compose_v2:
    project_src: "{{ nexus_root_directory }}"
    project_name: nexus
    state: present
    pull: always
  environment:
    # Nexus Configuration
    NEXUS_ROOT_DIRECTORY: "{{ nexus_root_directory }}"
    NEXUS_DATA_DIRECTORY: "{{ nexus_data_directory | default('/Volumes/Data') }}"
    NEXUS_DOMAIN: "{{ nexus_domain }}"
    TZ: "{{ tz | default('America/Vancouver') }}"
    # Cloudflare
    CLOUDFLARE_DNS_API_TOKEN: "{{ cloudflare_api_token | default('') }}"
    CLOUDFLARE_ZONE_ID: "{{ cloudflare_zone_id | default('') }}"
    ACME_EMAIL: "{{ acme_email | default('') }}"
    # FoundryVTT
    FOUNDRY_USERNAME: "{{ foundry_username | default('admin') }}"
    FOUNDRY_PASSWORD: "{{ foundry_password | default('') }}"
    FOUNDRY_ADMIN_KEY: "{{ foundry_admin_key | default('') }}"
    # Sure
    SURE_POSTGRES_USER: "{{ sure_postgres_user | default('sure_user') }}"
    SURE_POSTGRES_PASSWORD: "{{ sure_postgres_password | default('') }}"
    SURE_POSTGRES_DB: "{{ sure_postgres_db | default('sure_production') }}"
    SURE_SECRET_KEY_BASE: "{{ sure_secret_key_base | default('') }}"
    SURE_OPENAI_ACCESS_TOKEN: "{{ sure_openai_access_token | default('') }}"
    SURE_OPENAI_URI_BASE: "{{ sure_openai_uri_base | default('') }}"
    SURE_OPENAI_MODEL: "{{ sure_openai_model | default('') }}"
    SURE_PORT: "{{ sure_port | default('5006') }}"
    SURE_DATA_DIRECTORY: "{{ nexus_sure_dir }}"
    # Monitoring
    GRAFANA_ADMIN_USER: "{{ grafana_admin_user | default('admin') }}"
    GRAFANA_ADMIN_PASSWORD: "{{ grafana_admin_password | default('') }}"
    # Alerting
    DISCORD_WEBHOOK_URL: "{{ discord_webhook_url | default('') }}"
    # Backups
    NEXUS_USERDATA_DIRECTORY: "{{ nexus_userdata_env_dir }}"
    RESTIC_PASSWORD: "{{ restic_password | default('') }}"
    # Tailscale
    TAILNET_ID: "{{ tailnet_id | default('') }}"
    TAILSCALE_API_KEY: "{{ tailscale_api_key | default('') }}"
    # Vaultwarden
    VAULTWARDEN_ADMIN_TOKEN: "{{ vaultwarden_admin_token | default('') }}"
    VAULTWARDEN_SIGNUPS_ALLOWED: "{{ vaultwarden_signups_allowed | default('false') }}"
    VAULTWARDEN_INVITATIONS_ALLOWED: "{{ vaultwarden_invitations_allowed | default('true') }}"
    # Paperless-ngx
    PAPERLESS_POSTGRES_USER: "{{ paperless_postgres_user | default('paperless') }}"
    PAPERLESS_POSTGRES_PASSWORD: "{{ paperless_postgres_password | default('') }}"
    PAPERLESS_POSTGRES_DB: "{{ paperless_postgres_db | default('paperless') }}"
    PAPERLESS_SECRET_KEY: "{{ paperless_secret_key | default('') }}"
    PAPERLESS_ADMIN_USER: "{{ paperless_admin_user | default('admin') }}"
    PAPERLESS_ADMIN_PASSWORD: "{{ paperless_admin_password | default('') }}"
    PAPERLESS_DOCUMENTS_DIRECTORY: "{{ nexus_paperless_dir }}"
    GRIMMORY_BOOKS_DIRECTORY: "{{ nexus_grimmory_dir }}"
    FOUNDRYVTT_DATA_DIRECTORY: "{{ nexus_foundryvtt_dir }}"
    # Grimmory
    GRIMMORY_MYSQL_USER: "{{ grimmory_mysql_user | default('grimmory') }}"
    GRIMMORY_MYSQL_PASSWORD: "{{ grimmory_mysql_password | default('') }}"
    GRIMMORY_MYSQL_ROOT_PASSWORD: "{{ grimmory_mysql_root_password | default('') }}"
    # User/Group IDs for media containers
    PUID: "{{ puid | default('1000') }}"
    PGID: "{{ pgid | default('1000') }}"
  register: nexus_compose_result

- name: Display deployment result
  ansible.builtin.debug:
    msg: "Docker Compose {{ 'updated' if nexus_compose_result.changed else 'unchanged' }}"

- name: Wait for services to be healthy # noqa: no-handler
  ansible.builtin.pause:
    seconds: 15
  when: nexus_compose_result.changed

- name: Check container status
  community.docker.docker_container_info:
    name: "{{ item }}"
  loop: "{{ nexus_final_services }}"
  register: nexus_container_status
  failed_when: false

- name: Display container status
  ansible.builtin.debug:
    msg: "{{ item.container.Name | default(item.item) }}: {{ item.container.State.Status | default('not found') }}"
  loop: "{{ nexus_container_status.results }}"
  when: item.exists | default(false)
